name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write   # nécessaire pour pousser vers ghcr.io

jobs:
  # ------------------------------------------------------------------ #
  # Étape 1 — Qualité du code                                           #
  # ------------------------------------------------------------------ #
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/app

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: src/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  # ------------------------------------------------------------------ #
  # Étape 2 — Build de l'image Docker                                   #
  # Dépend de lint-and-test (fail fast)                                 #
  # ------------------------------------------------------------------ #
  build:
    name: Build & Publish image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v5

      # Authentification au container registry
      # Remplacer par les credentials de votre registry (ghcr.io, Scaleway, GitLab…)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: src/app
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/formation-devops:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/formation-devops:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
